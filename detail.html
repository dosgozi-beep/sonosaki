<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>キャンパスイノベーション｜アイディア詳細</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@600;800&family=Noto+Sans+JP:wght@400;500;700;900&family=RocknRoll+One&family=Zen+Kaku+Gothic+New:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }

  :root {
    --cream: #FBF5E5;
    --cream-2: #F2EAD0;
    --paper: #FFFDF6;
    --ink: #14111B;
    --ink-2: #3A3340;
    --vermillion: #E8412B;
    --vermillion-deep: #B82B1A;
    --purple: #9333A8;
    --sun: #FFCE2E;
    --mint: #6CD4B6;
    --indigo: #4A45D6;
  }

  body {
    font-family: 'Noto Sans JP', 'Zen Kaku Gothic New', system-ui, sans-serif;
    background:
      radial-gradient(60% 40% at 18% 0%, rgba(255,206,46,.22) 0%, transparent 60%),
      radial-gradient(50% 40% at 90% 90%, rgba(232,65,43,.22) 0%, transparent 60%),
      #14111B;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 28px 16px 48px;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }

  .phone {
    width: 100%;
    max-width: 412px;
    background: var(--cream);
    border-radius: 44px;
    overflow: hidden;
    position: relative;
    padding-bottom: 88px;
    box-shadow:
      0 0 0 2px #2A2333,
      0 0 0 12px #14111B,
      0 0 0 13px #322B3D,
      0 50px 100px -20px rgba(0,0,0,.65),
      0 25px 50px -12px rgba(0,0,0,.5);
  }
  .phone::before {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    background-image: radial-gradient(rgba(20,17,27,.05) 1px, transparent 1px);
    background-size: 3px 3px;
    mix-blend-mode: multiply;
    opacity: .55;
    z-index: 1;
  }

  .notch {
    position: absolute;
    top: 8px; left: 50%;
    transform: translateX(-50%);
    width: 100px; height: 28px;
    background: #14111B;
    border-radius: 16px;
    z-index: 5;
  }

  .status-bar {
    height: 44px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 22px;
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 800;
    font-size: 14px;
    color: var(--ink);
    letter-spacing: .02em;
    position: relative;
    z-index: 2;
  }
  .status-bar .icons { display: flex; gap: 6px; align-items: center; font-size: 13px; }
  .status-bar .battery {
    width: 26px; height: 12px; border-radius: 3px;
    border: 1.5px solid var(--ink); position: relative;
  }
  .status-bar .battery::after { content:""; position: absolute; right:-3px; top:3px; width:2px; height:4px; background: var(--ink); border-radius: 0 1px 1px 0; }
  .status-bar .battery::before { content:""; position: absolute; left:1px; top:1px; bottom:1px; width:70%; background: var(--ink); border-radius:1px; }

  /* === Top bar === */
  .topbar {
    position: relative;
    z-index: 2;
    padding: 8px 18px 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .icon-btn {
    width: 38px; height: 38px;
    background: var(--paper);
    border: 1.5px solid var(--ink);
    border-radius: 12px;
    display: grid;
    place-items: center;
    cursor: pointer;
    transition: transform .15s ease;
    text-decoration: none;
    color: var(--ink);
  }
  .icon-btn:hover { transform: translateY(-2px); }
  .icon-btn svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .topbar .actions { display: flex; gap: 8px; }

  /* === Hero === */
  .hero-card {
    position: relative;
    z-index: 2;
    margin: 6px 18px 0;
    aspect-ratio: 4 / 3;
    border-radius: 18px;
    border: 2px solid var(--ink);
    box-shadow: 6px 6px 0 var(--ink);
    overflow: hidden;
    color: #fff;
    padding: 18px 18px 22px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .hero-card .thumb-art {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 0;
  }
  .hero-card > *:not(.thumb-art) {
    position: relative;
    z-index: 1;
  }
  .hero-card .topline {
    align-self: flex-start;
    background: rgba(255,255,255,.95);
    color: var(--ink);
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 800;
    font-size: 11px;
    padding: 5px 10px;
    border-radius: 5px;
    letter-spacing: .15em;
    line-height: 1;
  }
  .hero-card .emoji-bg {
    display: none;
  }
  .hero-card .hero-logo {
    margin: 0;
    font-family: 'RocknRoll One', sans-serif;
    font-size: 42px;
    line-height: 1.05;
    letter-spacing: .005em;
    text-shadow: 3px 3px 0 rgba(20,17,27,.55);
    position: relative;
    z-index: 2;
  }
  .hero-card .hero-tag {
    margin: 8px 0 0;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-weight: 700;
    font-size: 13px;
    line-height: 1.5;
    color: rgba(255,255,255,.95);
    text-shadow: 1px 1px 0 rgba(20,17,27,.4);
    position: relative;
    z-index: 2;
  }
  .hero-card .stamp {
    position: absolute;
    top: 14px; right: 14px;
    background: var(--vermillion);
    color: #fff;
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 800;
    font-size: 10px;
    letter-spacing: .15em;
    padding: 4px 8px;
    border-radius: 4px;
    transform: rotate(8deg);
    border: 2px solid var(--ink);
    box-shadow: 2px 2px 0 var(--ink);
    z-index: 3;
  }

  /* Theme variants */
  .theme-vermillion { background: linear-gradient(160deg,#E8412B,#FF7F3F); }
  .theme-indigo     { background: linear-gradient(160deg,#4A45D6,#7B6CFF); }
  .theme-mint       { background: linear-gradient(160deg,#1B7F5A,#6CD4B6); }
  .theme-sun        { background: linear-gradient(160deg,#D4A100,#FFCE2E); color: var(--ink); }
  .theme-sun .topline { background: var(--ink); color: var(--sun); }
  .theme-sun .hero-logo { color: var(--ink); text-shadow: 3px 3px 0 rgba(255,255,255,.6); }
  .theme-sun .hero-tag { color: var(--ink); text-shadow: 1px 1px 0 rgba(255,255,255,.5); }
  .theme-night      { background: linear-gradient(160deg,#0E2C5C,#3F6FB0); }
  .theme-navy       { background: linear-gradient(160deg,#0E2C5C,#3F6FB0); }
  .theme-rose       { background: linear-gradient(160deg,#C13F77,#FF93C5); }
  .theme-teal       { background: linear-gradient(160deg,#1D7A7A,#48C7C7); }
  .theme-purple     { background: linear-gradient(160deg,#9333A8,#D27BFF); }

  /* === Author strip === */
  .author-strip {
    position: relative;
    z-index: 2;
    margin: 16px 18px 0;
    background: var(--paper);
    border: 2px solid var(--ink);
    border-radius: 14px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 3px 3px 0 var(--ink);
  }
  .author-strip .avatar {
    width: 42px; height: 42px;
    border-radius: 50%;
    background: var(--cream-2);
    border: 2px solid var(--ink);
    overflow: hidden;
    flex-shrink: 0;
  }
  .author-strip .avatar svg {
    width: 100%; height: 100%; display: block;
  }
  .author-strip .meta { flex: 1; line-height: 1.2; }
  .author-strip .name { font-weight: 900; font-size: 13px; color: var(--ink); }
  .author-strip .dept {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 700;
    font-size: 10px;
    color: var(--ink-2);
    margin-top: 3px;
    letter-spacing: .04em;
  }
  .author-strip .stats {
    display: flex;
    gap: 10px;
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 800;
    font-size: 12px;
  }
  .author-strip .stat { display: flex; align-items: center; gap: 3px; }
  .author-strip .stat.likes { color: var(--vermillion); }
  .author-strip .stat svg { width: 13px; height: 13px; }

  /* === Section blocks === */
  .section {
    position: relative;
    z-index: 2;
    margin-top: 24px;
    padding: 0 22px;
  }
  .section .kicker {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 800;
    font-size: 10px;
    color: var(--vermillion);
    letter-spacing: .25em;
    text-transform: uppercase;
  }
  .section .kicker::before {
    content: ""; width: 22px; height: 2px; background: var(--vermillion);
  }
  .section h2 {
    margin: 6px 0 10px;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-weight: 900;
    font-size: 20px;
    letter-spacing: -.02em;
    color: var(--ink);
  }
  .section p {
    margin: 0;
    font-size: 13px;
    line-height: 1.75;
    color: var(--ink-2);
    font-weight: 500;
  }

  /* Highlight cards (Problem / Approach) */
  .highlight-block {
    margin-top: 12px;
    background: var(--paper);
    border: 2px solid var(--ink);
    border-radius: 14px;
    padding: 14px 16px;
    box-shadow: 4px 4px 0 var(--ink);
    position: relative;
  }
  .highlight-block.problem { border-color: var(--vermillion); box-shadow: 4px 4px 0 var(--vermillion); }
  .highlight-block.solution { border-color: var(--ink); box-shadow: 4px 4px 0 var(--sun); background: var(--paper); }
  .highlight-block .icon {
    position: absolute;
    top: -14px; left: 14px;
    width: 32px; height: 32px;
    background: var(--cream);
    border: 2px solid var(--ink);
    border-radius: 50%;
    display: grid;
    place-items: center;
    font-size: 16px;
  }
  .highlight-block.problem .icon { background: var(--vermillion); border-color: var(--ink); }
  .highlight-block.solution .icon { background: var(--sun); border-color: var(--ink); }
  .highlight-block p {
    margin-top: 6px;
    font-size: 13px;
    line-height: 1.75;
  }

  /* Tags */
  .tag-list {
    margin-top: 10px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .tag {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 800;
    font-size: 11px;
    background: var(--ink);
    color: var(--cream);
    padding: 5px 10px;
    border-radius: 999px;
    letter-spacing: .04em;
  }
  .tag::before { content: "#"; opacity: .55; margin-right: 1px; }

  /* === Comments === */
  .comments {
    margin-top: 28px;
    padding: 22px 18px 0;
    border-top: 2px dashed rgba(20,17,27,.18);
    position: relative;
    z-index: 2;
  }
  .comments h2 {
    margin: 6px 0 14px;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-weight: 900;
    font-size: 20px;
    letter-spacing: -.02em;
    color: var(--ink);
  }
  .comments h2 .count {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 800;
    font-size: 13px;
    color: var(--vermillion);
    margin-left: 6px;
  }
  .comment {
    background: var(--paper);
    border: 1.5px solid var(--ink);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 10px;
    position: relative;
  }
  .comment .head { display: flex; align-items: center; gap: 8px; }
  .comment .avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--cream-2);
    border: 1.5px solid var(--ink);
    overflow: hidden;
    flex-shrink: 0;
  }
  .comment .avatar svg {
    width: 100%; height: 100%; display: block;
  }
  .comment .who { line-height: 1.2; flex: 1; }
  .comment .who .n { font-weight: 800; font-size: 12px; }
  .comment .who .d { font-family: 'Bricolage Grotesque', sans-serif; font-weight: 700; font-size: 9px; color: var(--ink-2); margin-top: 2px; letter-spacing: .04em; }
  .comment .like {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 800;
    font-size: 11px;
    color: var(--vermillion);
  }
  .comment .text {
    margin: 8px 0 0;
    font-size: 12px;
    line-height: 1.65;
    color: var(--ink-2);
  }

  /* Comment input */
  .comment-input {
    margin-top: 14px;
    display: flex;
    gap: 8px;
    background: var(--paper);
    border: 2px solid var(--ink);
    border-radius: 14px;
    padding: 8px 8px 8px 14px;
    box-shadow: 3px 3px 0 var(--ink);
  }
  .comment-input input {
    flex: 1;
    border: none;
    background: transparent;
    font-family: inherit;
    font-size: 13px;
    color: var(--ink);
    outline: none;
  }
  .comment-input button {
    background: var(--ink);
    color: var(--sun);
    border: none;
    border-radius: 9px;
    padding: 6px 14px;
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 800;
    font-size: 11px;
    letter-spacing: .12em;
    cursor: pointer;
  }

  /* === Sticky bottom CTA === */
  .sticky-cta {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    z-index: 6;
    background: var(--paper);
    border-top: 2px solid var(--ink);
    padding: 12px 18px 24px;
    display: flex;
    gap: 10px;
  }
  .cta-secondary {
    flex: 0 0 auto;
    background: var(--paper);
    color: var(--ink);
    border: 2px solid var(--ink);
    border-radius: 14px;
    padding: 10px 14px;
    font-family: inherit;
    font-weight: 800;
    font-size: 12px;
    cursor: pointer;
    box-shadow: 3px 3px 0 var(--ink);
    transition: transform .15s ease;
  }
  .cta-secondary:hover { transform: translateY(-2px); }
  .collab-link {
    color: var(--purple);
    box-shadow: 3px 3px 0 var(--purple);
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .cta-primary {
    flex: 1;
    background: var(--vermillion);
    color: var(--cream);
    border: 2px solid var(--ink);
    border-radius: 14px;
    padding: 10px 14px;
    font-family: inherit;
    font-weight: 800;
    font-size: 13px;
    cursor: pointer;
    box-shadow: 3px 3px 0 var(--ink);
    transition: transform .15s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .cta-primary:hover { transform: translateY(-2px); }
  .cta-primary .heart {
    display: inline-block;
    transform: scale(1.2);
  }
  .cta-primary .num {
    font-family: 'Bricolage Grotesque', sans-serif;
    background: rgba(255,255,255,.25);
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 11px;
  }

  /* fade in */
  .phone > * { animation: fadein .5s ease both; }
  .phone > *:nth-child(2) { animation-delay: .04s; }
  .phone > *:nth-child(3) { animation-delay: .1s; }
  .phone > *:nth-child(4) { animation-delay: .14s; }
  .phone > *:nth-child(5) { animation-delay: .18s; }
  @keyframes fadein {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>

function render(id) {
  const idea = ideas[id] || ideas['001'];

  // Hero
  const hero = document.getElementById('heroCard');
  hero.className = 'hero-card theme-' + idea.theme;
  document.getElementById('heroCategory').textContent = idea.category;
  document.getElementById('heroEmoji').textContent = idea.emoji;
  document.querySelector('#heroArt use').setAttribute('href', '#art-' + id);
  document.getElementById('heroTitle').textContent = idea.title;
  document.getElementById('heroTag').textContent = idea.tagline;
  document.getElementById('heroId').textContent = id;
  document.title = idea.title + ' — キャンパスイノベーション';

  // Author
  // Portrait mapping by name
  function getPortrait(name) {
    const map = {
      '佐々木 ユウキ': 'sasaki', '中村 リョウ': 'ryou', '渡辺 ミナミ': 'minami',
      '森田 リオ': 'rio', '佐藤 ハルト': 'haruto', '岡本 ソウタ': 'souta',
      '山田 リサ': 'risa', '田中 ユイ': 'yui', '鈴木 ナオ': 'risa',
      '高橋 マイ': 'mai', '中村 アスカ': 'rio', '田中 ユウキ': 'yuki',
      '山下 ダイチ': 'daichi'
    };
    if (map[name]) return map[name];
    // Fallback by surname for comment authors
    const surnameMap = {
      '田中': 'yui', '山田': 'haruto', '佐藤': 'haruto', '鈴木': 'risa',
      '高橋': 'mai', '中村': 'ryou', '渡辺': 'minami', '伊藤': 'yui',
      '小林': 'souta', '加藤': 'rio', '藤本': 'minami', '森田': 'rio',
      '岡本': 'souta', '佐々木': 'sasaki', '吉田': 'haruto', '山本': 'sasaki'
    };
    const surname = name.split(' ')[0];
    return surnameMap[surname] || 'sasaki';
  }
  
  document.getElementById('authorAvatar').innerHTML = `<svg viewBox="0 0 100 100"><use href="#portrait-${getPortrait(idea.author)}"/></svg>`;
  document.getElementById('authorName').textContent = idea.author;
  document.getElementById('authorDept').textContent = idea.dept + ' · ' + idea.date;
  document.getElementById('statLikes').textContent = idea.likes;
  document.getElementById('statComments').textContent = idea.comments_n;
  document.getElementById('ctaLikes').textContent = idea.likes;
  document.getElementById('collabLink').href = 'collab_send.html?id=' + id;

  // Sections
  document.getElementById('textDescription').textContent = idea.description;
  document.getElementById('textProblem').textContent = idea.problem;
  document.getElementById('textSolution').textContent = idea.solution;
  document.getElementById('textTarget').textContent = idea.target;

  // Tags
  const tagList = document.getElementById('tagList');
  tagList.innerHTML = '';
  idea.tags.forEach(t => {
    const span = document.createElement('span');
    span.className = 'tag';
    span.textContent = t;
    tagList.appendChild(span);
  });

  // Comments
  document.getElementById('commentCount').textContent = '(' + idea.comments_n + ')';
  const list = document.getElementById('commentsList');
  list.innerHTML = '';
  idea.comments.forEach(c => {
    const div = document.createElement('div');
    div.className = 'comment';
    div.innerHTML = `
      <div class="head">
        <div class="avatar"><svg viewBox="0 0 100 100"><use href="#portrait-${getPortrait(c.name)}"/></svg></div>
        <div class="who">
          <div class="n">${c.name}</div>
          <div class="d">${c.dept}</div>
        </div>
        <div class="like">♥ ${c.likes}</div>
      </div>
      <p class="text">${c.text}</p>
    `;
    list.appendChild(div);
  });
}

// Read ?id= from URL and render
const params = new URLSearchParams(window.location.search);
const id = params.get('id') || '001';
render(id);

// Like button micro-interaction
document.querySelector('.cta-primary').addEventListener('click', () => {
  const numEl = document.getElementById('ctaLikes');
  const heart = document.querySelector('.cta-primary .heart');
  numEl.textContent = parseInt(numEl.textContent) + 1;
  heart.style.animation = 'none';
  void heart.offsetWidth;
  heart.style.animation = 'pop .4s ease';
  document.getElementById('statLikes').textContent = numEl.textContent;
});

// Inject pop keyframes
const style = document.createElement('style');
style.textContent = '@keyframes pop { 0% { transform: scale(1.2);} 30% {transform: scale(1.7);} 100% {transform: scale(1.2);} }';
document.head.appendChild(style);
</script>
