<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>キャンパスイノベーション｜起動中</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@600;800&family=RocknRoll+One&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  :root {
    --cream: #FBF5E5; --paper: #FFFDF6;
    --ink: #14111B;
    --vermillion: #E8412B; --sun: #FFCE2E;
  }
  body {
    font-family: 'RocknRoll One', sans-serif;
    background:
      radial-gradient(60% 40% at 18% 0%, rgba(255,206,46,.22) 0%, transparent 60%),
      radial-gradient(50% 40% at 90% 90%, rgba(232,65,43,.22) 0%, transparent 60%),
      #14111B;
    min-height: 100vh; display: flex; justify-content: center; align-items: flex-start;
    padding: 28px 16px 48px;
    -webkit-font-smoothing: antialiased;
  }
  .phone {
    width: 100%; max-width: 412px;
    height: 820px;
    background: var(--cream);
    border-radius: 44px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 0 0 2px #2A2333, 0 0 0 12px #14111B, 0 0 0 13px #322B3D,
      0 50px 100px -20px rgba(0,0,0,.65), 0 25px 50px -12px rgba(0,0,0,.5);
  }
  .phone::before {
    content: ""; position: absolute; inset: 0; pointer-events: none;
    background-image: radial-gradient(rgba(20,17,27,.05) 1px, transparent 1px);
    background-size: 3px 3px; mix-blend-mode: multiply; opacity: .55; z-index: 1;
  }
  .notch {
    position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
    width: 100px; height: 28px; background: #14111B; border-radius: 16px; z-index: 5;
  }

  /* === Splash content === */
  .splash {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 2;
  }

  /* Floating particles (decorative emojis) */
  .particles {
    position: absolute; inset: 0;
    pointer-events: none;
    overflow: hidden;
  }
  .particles span {
    position: absolute;
    font-size: 28px;
    opacity: 0;
    animation: particle-pop 2.4s ease-out forwards;
  }
  .particles span:nth-child(1) { top: 25%; left: 12%; font-size: 28px; animation-delay: .55s; }
  .particles span:nth-child(2) { top: 32%; right: 14%; font-size: 24px; animation-delay: .7s; }
  .particles span:nth-child(3) { bottom: 35%; left: 18%; font-size: 22px; animation-delay: .85s; }
  .particles span:nth-child(4) { bottom: 28%; right: 16%; font-size: 32px; animation-delay: .65s; }
  .particles span:nth-child(5) { top: 42%; left: 8%; font-size: 18px; animation-delay: 1s; }
  .particles span:nth-child(6) { bottom: 42%; right: 10%; font-size: 18px; animation-delay: 1.1s; }
  @keyframes particle-pop {
    0% { opacity: 0; transform: scale(.4) rotate(-30deg); }
    25% { opacity: 1; transform: scale(1.15) rotate(8deg); }
    100% { opacity: 0; transform: scale(.9) translateY(-30px) rotate(20deg); }
  }

  /* Brand mark */
  .brand-mark {
    width: 144px;
    height: 144px;
    background: var(--ink);
    color: var(--sun);
    border: 3px solid var(--ink);
    border-radius: 32px;
    display: grid;
    place-items: center;
    font-size: 84px;
    line-height: 1;
    transform: rotate(-6deg) scale(.3);
    opacity: 0;
    box-shadow: 8px 8px 0 var(--vermillion), 16px 16px 0 var(--sun);
    position: relative;
    animation: mark-in .9s cubic-bezier(.5, 1.6, .5, 1) .15s forwards;
  }
  @keyframes mark-in {
    to { transform: rotate(-6deg) scale(1); opacity: 1; }
  }
  .brand-mark::after {
    content: "";
    position: absolute;
    top: -10px; right: -10px;
    width: 26px; height: 26px;
    background: var(--vermillion);
    border-radius: 50%;
    border: 3px solid var(--cream);
    opacity: 0;
    animation: dot-pop .4s cubic-bezier(.5, 1.6, .5, 1) 1s forwards;
  }
  @keyframes dot-pop {
    from { transform: scale(0); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }

  /* Brand name reveal */
  .brand-name {
    margin-top: 36px;
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 800;
    font-size: 14px;
    letter-spacing: .35em;
    color: var(--vermillion);
    opacity: 0;
    transform: translateY(8px);
    animation: name-in .5s ease-out 1.15s forwards;
  }
  .brand-tagline {
    margin-top: 8px;
    font-family: 'RocknRoll One', sans-serif;
    font-size: 18px;
    color: var(--ink);
    line-height: 1.3;
    text-align: center;
    opacity: 0;
    transform: translateY(8px);
    animation: name-in .5s ease-out 1.35s forwards;
  }
  @keyframes name-in {
    to { opacity: 1; transform: translateY(0); }
  }

  /* Bottom loading dots */
  .loading-dots {
    position: absolute;
    bottom: 76px;
    left: 50%; transform: translateX(-50%);
    display: flex;
    gap: 6px;
    opacity: 0;
    animation: name-in .4s ease-out 1.6s forwards;
  }
  .loading-dots span {
    width: 8px; height: 8px;
    background: var(--ink);
    border-radius: 50%;
    animation: dot-bounce 1.2s ease-in-out infinite;
  }
  .loading-dots span:nth-child(2) { animation-delay: .15s; }
  .loading-dots span:nth-child(3) { animation-delay: .3s; }
  @keyframes dot-bounce {
    0%, 60%, 100% { transform: scale(.7); opacity: .35; }
    30% { transform: scale(1.2); opacity: 1; background: var(--vermillion); }
  }

  /* Footer brand attribution */
  .splash-footer {
    position: absolute;
    bottom: 30px;
    left: 50%; transform: translateX(-50%);
    text-align: center;
    opacity: 0;
    animation: name-in .4s ease-out 1.6s forwards;
  }
  .splash-footer .made {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 700;
    font-size: 9.5px;
    color: var(--ink-2, #3A3340);
    letter-spacing: .2em;
    line-height: 1.6;
  }
  .splash-footer .made strong { color: var(--vermillion); font-weight: 800; }
  .splash-footer .ver {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 700;
    font-size: 8.5px;
    color: rgba(20,17,27,.4);
    letter-spacing: .15em;
    margin-top: 2px;
  }

  /* Tap to continue button (after animation done) */
  .tap-continue {
    position: absolute;
    inset: 0;
    z-index: 99;
    display: grid;
    place-items: center;
    background: rgba(20,17,27,0);
    cursor: pointer;
    opacity: 0;
    animation: name-in .4s ease 2.5s forwards;
  }
  .tap-pill {
    background: var(--ink);
    color: var(--sun);
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 800;
    font-size: 10px;
    padding: 8px 14px;
    border-radius: 999px;
    border: 1.5px solid var(--ink);
    letter-spacing: .15em;
    margin-top: 280px;
    box-shadow: 3px 3px 0 var(--vermillion);
    animation: tap-pulse 1.6s ease-in-out infinite;
  }
  @keyframes tap-pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.06); }
  }
</style>
</head>
<body>

<div class="phone">
  <div class="notch"></div>

  <div class="splash">
    <div class="particles">
      <span>💡</span>
      <span>⚡</span>
      <span>🔥</span>
      <span>✨</span>
      <span>🌟</span>
      <span>💫</span>
    </div>

    <div class="brand-mark">閃</div>

    <div class="brand-name">CAMPUS×INNOVATION</div>
    <div class="brand-tagline">キャンパス<br>イノベーション</div>
  </div>

  <div class="loading-dots">
    <span></span>
    <span></span>
    <span></span>
  </div>

  <div class="splash-footer">
    <div class="made">MADE BY <strong>STUDENTS</strong> · FOR <strong>STUDENTS</strong></div>
    <div class="ver">v 1.2.4</div>
  </div>

  <div class="tap-continue" onclick="window.location.href='login.html'">
    <div class="tap-pill">TAP TO CONTINUE →</div>
  </div>
</div>

<script>
  // Auto-redirect to login after 3.5 seconds (uncomment for auto)
  // setTimeout(() => window.location.href = 'login.html', 3500);
</script>

</body>
</html>
