<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { height: -webkit-fill-available; }
  html, body {
    margin: 0; padding: 0;
    width: 100%;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  body {
    background: #F6F1E8;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    height: 100vh;
    height: 100dvh;
    height: -webkit-fill-available;
  }
  #root {
    width: 100%;
    height: 100vh;
    height: 100dvh;
    height: -webkit-fill-available;
  }
  /* Mobile fullscreen overrides */
  @media (max-width: 600px) {
    /* Outer wrapper — remove its centering padding on mobile */
    #root > div {
      background: none !important;
      padding: 0 !important;
      min-height: 100vh !important;
      min-height: 100dvh !important;
      min-height: -webkit-fill-available !important;
      align-items: stretch !important;

    /* Phone frame becomes the full screen */
    #root > div > div {
      width: 100% !important;
      max-width: 100% !important;
      height: 100vh !important;

<script type="text/babel" data-presets="react">
// SONOSAKI v2 — Task-centric, member-friendly
// Single React component, uses localStorage

// ─── Color tokens ────────────────────────────────────────────
const c = {

const fontBody    = "'Zen Kaku Gothic New', 'Hiragino Kaku Gothic ProN', sans-serif";

// ─── Constants ───────────────────────────────────────────────
const ROLES = {

  pm:     { label: 'PM',      short: 'PM',    color: c.gold,    canCreateProject: true,  canAssignTasks: true },
  member: { label: 'メンバー', short: 'M',    color: c.sage,    canCreateProject: false, canAssignTasks: true },
  ob:     { label: 'OB',      short: 'OB',    color: c.sky,     canCreateProject: false, canAssignTasks: false },

const PHASES = {
  ideation:   { label: '構想期', short: '構想', color: c.sky },
  validation: { label: '検証期', short: '検証', color: c.sage },
  execution:  { label: '実行期', short: '実行', color: c.accent },

  completed:  { label: '完了',   short: '完了', color: c.inkSoft },
};

const PRIORITY = {
  high:   { label: '高', color: c.warning, dot: '●' },
  medium: { label: '中', color: c.gold,    dot: '●' },
  low:    { label: '低', color: c.sky,     dot: '○' },
};

const TAGS = ['事業', 'ビジコン', 'イベント', '学び', '広報', 'その他'];

// ─── Utils ───────────────────────────────────────────────────
const uid = () => Math.random().toString(36).slice(2, 10);
const now = () => new Date().toISOString();
const todayStr = () => new Date().toISOString().slice(0, 10);

function daysBetween(a, b) {
  const da = new Date(a); da.setHours(0,0,0,0);
  const db = new Date(b); db.setHours(0,0,0,0);
  return Math.round((db - da) / (1000*60*60*24));
}

function formatDue(dateStr) {
  if (!dateStr) return '';
  const diff = daysBetween(todayStr(), dateStr);
  if (diff < 0) return `${Math.abs(diff)}日遅れ`;
  if (diff === 0) return '今日';
  if (diff === 1) return '明日';
  if (diff < 7) {
    const d = new Date(dateStr);
    return ['日','月','火','水','木','金','土'][d.getDay()] + '曜';
  }
  if (diff < 14) return '来週';
  const d = new Date(dateStr);
  return `${d.getMonth()+1}/${d.getDate()}`;
}

function dueColor(dateStr) {
  if (!dateStr) return c.inkLight;
  const diff = daysBetween(todayStr(), dateStr);
  if (diff < 0) return c.danger;
  if (diff === 0) return c.warning;
  if (diff <= 2) return c.accent;
  return c.inkSoft;
}

function formatRelative(iso) {
  const diff = (Date.now() - new Date(iso).getTime()) / 1000;
  if (diff < 60) return '今';
  if (diff < 3600) return `${Math.floor(diff/60)}分前`;
  if (diff < 86400) return `${Math.floor(diff/3600)}時間前`;
  return `${Math.floor(diff/86400)}日前`;
}

// ─── Seed Data ───────────────────────────────────────────────
function seedData() {

  const profiles = [
    { id: 'u1', name: '海老原',   short: '海',  email: '',  role: 'rep',    accent: c.accent     },
    { id: 'u2', name: 'メンバーA', short: 'A',  email: '',  role: 'pm',     accent: c.gold       },
    { id: 'u3', name: 'メンバーB', short: 'B',  email: '',  role: 'pm',     accent: c.sage       },
    { id: 'u4', name: 'メンバーC', short: 'C',  email: '',  role: 'member', accent: c.sky        },
    { id: 'u5', name: 'メンバーD', short: 'D',  email: '',  role: 'member', accent: c.accentDeep },
    { id: 'u6', name: 'メンバーE', short: 'E',  email: '',  role: 'member', accent: c.warning    },
    { id: 'u7', name: 'OB先輩',    short: 'OB', email: '',  role: 'ob',     accent: c.skyDeep    },

    { id: 'p2', name: 'ビジコン挑戦チーム', tag: 'ビジコン',

      phase: 'validation',
      vision: '実践の場で力を試す',
      accent: c.gold, created_at: daysAgo(60), updated_at: daysAgo(2) },
    { id: 'p3', name: '新歓・新メンバー育成 2026', tag: 'イベント',
      owner_id: 'u3', member_ids: ['u3','u5','u6'],
      phase: 'execution',
      vision: '次世代に続く仲間を迎え入れる',
      accent: c.sky, created_at: daysAgo(45), updated_at: daysAgo(0) },

  const tasks = [
    { id: uid(), project_id: 'p1', assignee_id: 'u4', creator_id: 'u1',
      title: '企画書ドラフト v1 提出', detail: 'A4 2枚程度。ビジョンと目的を中心に。',
      due: addDays(0), priority: 'high', status: 'in_progress', created_at: daysAgo(3) },
    { id: uid(), project_id: 'p2', assignee_id: 'u4', creator_id: 'u2',
      title: 'スライド構成案 作成', detail: '一次審査用。10枚以内。',
      due: addDays(2), priority: 'medium', status: 'todo', created_at: daysAgo(2) },
    { id: uid(), project_id: 'p3', assignee_id: 'u4', creator_id: 'u3',
      title: 'フライヤーデザイン確認・SNS投稿', detail: '',
      due: addDays(5), priority: 'medium', status: 'todo', created_at: daysAgo(1) },
    { id: uid(), project_id: 'p1', assignee_id: 'u4', creator_id: 'u1',
      title: '協力企業3社リストアップ', detail: '',
      due: addDays(7), priority: 'low', status: 'todo', created_at: daysAgo(1) },
    { id: uid(), project_id: 'p2', assignee_id: 'u4', creator_id: 'u2',
      title: '審査会場の下見', detail: '',
      due: addDays(10), priority: 'low', status: 'todo', created_at: daysAgo(0) },
    // Tasks for others (for project view)
    { id: uid(), project_id: 'p1', assignee_id: 'u5', creator_id: 'u1',
      title: 'インタビュー10人実施', detail: '',
      due: addDays(14), priority: 'medium', status: 'in_progress', created_at: daysAgo(5) },
    { id: uid(), project_id: 'p3', assignee_id: 'u5', creator_id: 'u3',
      title: '会場予約の最終確認', detail: '',
      due: addDays(3), priority: 'high', status: 'todo', created_at: daysAgo(1) },
    { id: uid(), project_id: 'p3', assignee_id: 'u6', creator_id: 'u3',
      title: '当日の進行台本作成', detail: '',

      memo: '次フェーズの方向性が決まった。企画書ドラフトに着手。',
      created_at: daysAgo(5) },
    { id: uid(), project_id: 'p3', user_id: 'u3',
      title: '4/24 新歓打合せ',

// ─── Storage hook (localStorage) ─────────────────────────────
function useAppState() {
  const [state, setState] = React.useState(null);
  const [loaded, setLoaded] = React.useState(false);

  React.useEffect(() => {
    try {
      const saved = localStorage.getItem('sonosaki:v2:state');
      if (saved) setState(JSON.parse(saved));
      else setState(seedData());
    } catch {
      setState(seedData());
    }
    setLoaded(true);
  }, []);

  React.useEffect(() => {
    if (!loaded || !state) return;
    try {
      localStorage.setItem('sonosaki:v2:state', JSON.stringify(state));
    } catch (e) { console.error('save failed', e); }
  }, [state, loaded]);

  return [state, setState, loaded];
}

// ─── Toast ───────────────────────────────────────────────────
function useToast() {
  const [msg, setMsg] = React.useState(null);
  const show = (text) => {
    setMsg(text);
    setTimeout(() => setMsg(null), 2400);
  };
  const Toast = msg ? (
    <div style={{
      position: 'absolute', left: '50%', bottom: 80, transform: 'translateX(-50%)',
      background: c.ink, color: c.paper, padding: '10px 16px', borderRadius: 999,
      fontFamily: fontBody, fontSize: 12, fontWeight: 500,
      boxShadow: '0 4px 16px rgba(28,25,22,0.2)', zIndex: 1000,
      maxWidth: '85%', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis',
    }}>{msg}</div>
  ) : null;
  return [Toast, show];
}

// ─── Reusable bits ───────────────────────────────────────────
function Avatar({ name, size = 28, accent = c.accent }) {
  return (
    <div style={{
      width: size, height: size, borderRadius: '50%',
      background: c.paper, border: `1.5px solid ${accent}`,
      color: accent, fontFamily: fontDisplay,
      fontSize: Math.round(size * 0.42), fontWeight: 500,
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      flexShrink: 0,
    }}>{name?.[0] || '?'}</div>
  );
}

function Pill({ children, bg, color, border }) {
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', padding: '2px 8px',
      borderRadius: 999, background: bg, color,
      border: border || 'transparent',
      fontFamily: fontBody, fontSize: 10, fontWeight: 600, letterSpacing: '0.04em',
    }}>{children}</span>
  );
}

function PhasePill({ phase, full = false }) {
  const p = PHASES[phase] || PHASES.ideation;
  return <Pill bg={`${p.color}1A`} color={p.color}>{full ? p.label : p.short}</Pill>;
}

function PriorityDot({ priority }) {
  const p = PRIORITY[priority] || PRIORITY.medium;
  return (
    <span style={{
      display: 'inline-block', width: 8, height: 8, borderRadius: '50%',
      background: priority === 'low' ? 'transparent' : p.color,
      border: priority === 'low' ? `1.5px solid ${p.color}` : 'none',
      flexShrink: 0,
    }}/>
  );
}

const inputStyle = {
  width: '100%', padding: '10px 12px',
  background: c.paper, border: `1px solid ${c.border}`,
  borderRadius: 8, fontFamily: fontBody, fontSize: 13, color: c.ink,
  outline: 'none', boxSizing: 'border-box',
};

// ─── Main App ────────────────────────────────────────────────
function App() {
  const [state, setState, loaded] = useAppState();
  const [view, setView] = React.useState('home');
  const [selectedProjectId, setSelectedProjectId] = React.useState(null);
  const [selectedTaskId, setSelectedTaskId] = React.useState(null);
  const [modal, setModal] = React.useState(null);
  const [Toast, showToast] = useToast();

  if (!loaded || !state) {
    return (
      <div style={{
        position: 'fixed', inset: 0, display: 'flex',
        alignItems: 'center', justifyContent: 'center',
        background: c.cream, fontFamily: fontDisplay,
        fontSize: 18, color: c.inkSoft, letterSpacing: '0.18em',
      }}>SONOSAKI</div>
    );
  }

  const me = state.profiles.find(p => p.id === state.currentUserId) || state.profiles[0];
  const myRole = ROLES[me.role];

  // Mutations
  const switchUser = (id) => setState(s => ({ ...s, currentUserId: id }));

  const updateTask = (id, patch) => setState(s => ({
    ...s,
    tasks: s.tasks.map(t => t.id === id ? { ...t, ...patch } : t),
  }));

  const addTask = (data) => {
    const id = uid();
    setState(s => ({
      ...s,
      tasks: [...s.tasks, { id, status: 'todo', created_at: now(), creator_id: s.currentUserId, ...data }],
    }));
    const assignee = state.profiles.find(p => p.id === data.assignee_id);
    if (assignee && assignee.email) {
      showToast(`${assignee.short}にメール通知を送信（本実装時）`);
    } else {
      showToast(`タスクを追加しました`);
    }
  };

  const deleteTask = (id) => setState(s => ({ ...s, tasks: s.tasks.filter(t => t.id !== id) }));

  const addProject = (data) => {
    const id = uid();
    setState(s => ({
      ...s,
      projects: [...s.projects, {
        id, owner_id: s.currentUserId, member_ids: [s.currentUserId],
        phase: 'ideation', accent: c.sage,
        created_at: now(), updated_at: now(), ...data,
      }],
    }));
    showToast('プロジェクトを作成しました');
  };

  const updateProject = (id, patch) => setState(s => ({
    ...s,
    projects: s.projects.map(p => p.id === id ? { ...p, ...patch, updated_at: now() } : p),
  }));

  const deleteProject = (id) => setState(s => ({
    ...s,
    projects: s.projects.filter(p => p.id !== id),
    tasks: s.tasks.filter(t => t.project_id !== id),
    recordings: s.recordings.filter(r => r.project_id !== id),
  }));

  const updateProfile = (id, patch) => setState(s => ({
    ...s,
    profiles: s.profiles.map(p => p.id === id ? { ...p, ...patch } : p),
  }));

  const addProfile = (data) => {
    const id = uid();
    setState(s => ({ ...s, profiles: [...s.profiles, { id, ...data }] }));
    showToast('メンバーを追加しました');
  };

  const deleteProfile = (id) => setState(s => ({
    ...s,
    profiles: s.profiles.filter(p => p.id !== id),
    projects: s.projects.map(p => ({ ...p, member_ids: p.member_ids.filter(m => m !== id) })),
  }));

  const addRecording = (data) => {
    const id = uid();
    setState(s => ({
      ...s,
      recordings: [{ id, user_id: s.currentUserId, created_at: now(), ...data }, ...s.recordings],
    }));
    showToast('録音を保存しました');
  };

  const deleteRecording = (id) => setState(s => ({
    ...s, recordings: s.recordings.filter(r => r.id !== id),
  }));

  // Render frame for desktop preview / mobile fullscreen
  return (
    <div style={{
      minHeight: '100vh', background: '#E8DFCC',
      padding: 'clamp(0px, 4vw, 40px)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      fontFamily: fontBody,
    }}>
      <div style={{
        width: '100%', maxWidth: 420, height: 'min(100vh, 880px)',
        background: c.cream, borderRadius: 32, overflow: 'hidden',
        boxShadow: '0 12px 48px rgba(28,25,22,0.18)',
        display: 'flex', flexDirection: 'column', position: 'relative',
      }}>
        {/* Status bar (hidden on real mobile via CSS) */}
        <div style={{
          height: 28, padding: '8px 20px 0',
          display: 'flex', alignItems: 'center', justifyContent: 'space-between',
          fontFamily: fontMono, fontSize: 11, color: c.ink, fontWeight: 600,
        }}>
          <span>9:41</span>
          <span>● ● ● ●</span>
        </div>

        {/* Top bar */}
        <div style={{
          padding: '8px 18px 10px',
          display: 'flex', alignItems: 'center', justifyContent: 'space-between',
          borderBottom: `1px solid ${c.borderSoft}`,
        }}>

            fontFamily: fontDisplay, fontSize: 13, color: c.ink,
            letterSpacing: '0.22em', fontWeight: 500,
          }}>SONOSAKI</span>
          <button onClick={() => setView('profile')} style={{
            background: 'transparent', border: 'none', padding: 0, cursor: 'pointer',
            display: 'flex', alignItems: 'center', gap: 6,
          }}>
            <span style={{ fontFamily: fontBody, fontSize: 10, color: c.inkLight }}>
              {myRole.label}
            </span>
            <Avatar name={me.short} size={26} accent={me.accent} />
          </button>
        </div>

        {/* Body */}
        <div style={{ flex: 1, overflow: 'hidden', display: 'flex', flexDirection: 'column', position: 'relative' }}>
          {view === 'home'    && <HomeView state={state} setView={setView}
            setSelectedTaskId={setSelectedTaskId} setSelectedProjectId={setSelectedProjectId}
            updateTask={updateTask} setModal={setModal} />}
          {view === 'recordings' && <RecordingsView state={state} setModal={setModal}
            deleteRecording={deleteRecording} setSelectedProjectId={setSelectedProjectId} setView={setView} />}
          {view === 'projects'   && <ProjectsView state={state} setView={setView}
            setSelectedProjectId={setSelectedProjectId} setModal={setModal} myRole={myRole} />}
          {view === 'profile'    && <ProfileView state={state} setState={setState} switchUser={switchUser}
            updateProfile={updateProfile} addProfile={addProfile} deleteProfile={deleteProfile}
            showToast={showToast} />}
          {view === 'projectDetail' && <ProjectDetailView state={state}
            projectId={selectedProjectId} setView={setView}
            setSelectedTaskId={setSelectedTaskId} setModal={setModal}
            updateTask={updateTask} updateProject={updateProject} deleteProject={deleteProject}
            myRole={myRole} />}
          {Toast}
        </div>

        {/* Bottom tabs */}
        <div style={{
          display: 'flex', borderTop: `1px solid ${c.border}`,
          background: c.paper, flexShrink: 0,

            { id: 'home',       label: 'タスク',     icon: 'task' },
            { id: 'recordings', label: '録音',       icon: 'mic'  },
            { id: 'projects',   label: 'プロジェクト', icon: 'folder' },
            { id: 'profile',    label: 'マイ',       icon: 'user' },

        {modal?.type === 'addTask' && (
          <TaskModal state={state} onClose={() => setModal(null)}

        )}

          <TaskModal state={state} onClose={() => setModal(null)}
            existing={state.tasks.find(t => t.id === modal.taskId)}
            onSubmit={(data) => { updateTask(modal.taskId, data); setModal(null); }}
            onDelete={() => { deleteTask(modal.taskId); setModal(null); showToast('タスクを削除しました'); }} />
        )}
        {modal?.type === 'addProject' && (
          <ProjectModal state={state} onClose={() => setModal(null)}
            onSubmit={(data) => { addProject(data); setModal(null); }} />
        )}
        {modal?.type === 'editProject' && (
          <ProjectModal state={state} onClose={() => setModal(null)}
            existing={state.projects.find(p => p.id === modal.projectId)}
            onSubmit={(data) => { updateProject(modal.projectId, data); setModal(null); }}
            onDelete={() => { deleteProject(modal.projectId); setModal(null); setView('projects'); showToast('プロジェクトを削除しました'); }} />
        )}
        {modal?.type === 'record' && (
          <RecordModal state={state} onClose={() => setModal(null)}
            onSubmit={(data) => { addRecording(data); setModal(null); }} />
        )}
      </div>
    </div>
  );
}

        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">

          <path d="M5 11a7 7 0 0014 0M12 18v3" stroke={stroke} strokeWidth="1.6" strokeLinecap="round"/>
        </svg>

        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">

// Mini Gantt: shows tasks across a 7-day window starting today
function MiniGantt({ tasks, state, onTap }) {
  const today = new Date(); today.setHours(0,0,0,0);
  const days = Array.from({ length: 7 }, (_, i) => {
    const d = new Date(today); d.setDate(d.getDate() + i);
    return d;
  });
  const dowLabels = ['日','月','火','水','木','金','土'];

  // For each task, calculate which days it spans (created_at → due)
  const visible = tasks.slice(0, 4); // show top 4

  return (
    <div style={{ padding: '8px 18px 14px' }}>
      <div style={{
        fontFamily: fontBody, fontSize: 9, color: c.inkLight,
        letterSpacing: '0.2em', marginBottom: 8, fontWeight: 600,
      }}>私の今週</div>
      <div style={{
        background: c.paper, border: `1px solid ${c.border}`,
        borderRadius: 10, padding: '10px 10px 8px', overflow: 'hidden',
      }}>
        {/* Day header */}
        <div style={{ display: 'flex', marginBottom: 6, paddingLeft: 4 }}>
          {days.map((d, i) => {
            const isToday = d.toISOString().slice(0,10) === todayStr();
            return (
              <div key={i} style={{
                flex: 1, textAlign: 'center',
                fontFamily: fontBody, fontSize: 8, fontWeight: isToday ? 700 : 400,
                color: isToday ? c.accent : c.inkLight,
              }}>
                <div>{dowLabels[d.getDay()]}</div>
                <div style={{ fontSize: 9, marginTop: 1 }}>{d.getDate()}</div>
              </div>
            );
          })}
        </div>

        {/* Today line */}
        <div style={{ position: 'relative', paddingLeft: 4 }}>
          <div style={{
            position: 'absolute', top: 0, bottom: 0, left: `calc(4px + ${(daysBetween(days[0].toISOString(), todayStr()) / 7) * 100}% + ${(0.5/7) * 100}%)`,
            width: 1, background: c.accent, opacity: 0.3,
          }}/>

          {visible.map(t => {
            const proj = state.projects.find(p => p.id === t.project_id);
            const startDate = new Date(t.created_at);
            startDate.setHours(0,0,0,0);
            const dueDate = t.due ? new Date(t.due) : null;
            if (!dueDate) return null;
            dueDate.setHours(0,0,0,0);

            // Clamp to window
            const winStart = days[0].getTime();
            const winEnd = days[6].getTime() + 86400000;
            const tStart = Math.max(startDate.getTime(), winStart, today.getTime() - 2*86400000);
            const tEnd = Math.min(dueDate.getTime() + 86400000, winEnd);
            if (tEnd <= winStart || tStart >= winEnd) return null;

            const offsetDays = (Math.max(tStart, winStart) - winStart) / 86400000;
            const widthDays = (tEnd - Math.max(tStart, winStart)) / 86400000;

            const left = (offsetDays / 7) * 100;
            const width = (widthDays / 7) * 100;

            return (
              <button key={t.id} onClick={() => onTap(t)} style={{
                display: 'block', width: '100%', textAlign: 'left',
                background: 'transparent', border: 'none', padding: '3px 0',
                cursor: 'pointer', position: 'relative',
              }}>
                <div style={{ position: 'relative', height: 18 }}>
                  <div style={{
                    position: 'absolute', left: `${left}%`, width: `${Math.max(width, 4)}%`,
                    top: 2, bottom: 2,
                    background: `${proj?.accent || c.sage}1F`,
                    border: `1px solid ${proj?.accent || c.sage}80`,
                    borderRadius: 4,
                    overflow: 'hidden', whiteSpace: 'nowrap',
                    paddingLeft: 5, paddingRight: 4,
                    display: 'flex', alignItems: 'center',
                  }}>
                    <span style={{
                      fontFamily: fontBody, fontSize: 9, color: c.ink,
                      fontWeight: 500, overflow: 'hidden', textOverflow: 'ellipsis',
                    }}>{t.title}</span>
                  </div>
                </div>
              </button>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function TaskRow({ task, state, onTap, updateTask }) {

  const dc = dueColor(task.due);

  return (
    <div style={{
      background: c.paper, border: `1px solid ${c.border}`,

        const newStatus = task.status === 'done' ? 'todo' : 'done';
        updateTask(task.id, { status: newStatus, completed_at: newStatus === 'done' ? now() : null });
      }} style={{
        background: 'transparent', border: 'none', padding: '12px 4px 12px 10px',
        cursor: 'pointer', display: 'flex', alignItems: 'flex-start',
      }}>
        <div style={{
          width: 18, height: 18, borderRadius: 5,
          border: `1.5px solid ${task.status === 'done' ? c.sage : c.border}`,

      </button>

      {/* Body */}

        flex: 1, background: 'transparent', border: 'none', padding: '10px 10px 10px 4px',
        cursor: 'pointer', textAlign: 'left',
      }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 5, marginBottom: 3 }}>
          <PriorityDot priority={task.priority} />
          <span style={{
            fontFamily: fontBody, fontSize: 9, color: c.inkLight,
            letterSpacing: '0.08em',
          }}>{proj?.name || '—'}</span>
        </div>
        <div style={{
          fontFamily: fontBody, fontSize: 13, color: c.ink, fontWeight: 500,
          textDecoration: task.status === 'done' ? 'line-through' : 'none',
          opacity: task.status === 'done' ? 0.5 : 1,
          lineHeight: 1.3, marginBottom: 4,
        }}>{task.title}</div>
        <div style={{
          display: 'flex', alignItems: 'center', gap: 8,
          fontFamily: fontBody, fontSize: 10, color: c.inkLight,
        }}>
          <span style={{ color: dc, fontWeight: 600 }}>
            {task.due ? formatDue(task.due) : '締切なし'}
          </span>
          {creator && creator.id !== task.assignee_id && (
            <span>← {creator.short}より</span>
          )}
        </div>
      </button>
    </div>
  );
}

  const owner = state.projects.find(x => x.id === projectId);
  const ownerProfile = state.profiles.find(u => u.id === p.owner_id);
  const members = p.member_ids.map(id => state.profiles.find(u => u.id === id)).filter(Boolean);
  const projTasks = state.tasks.filter(t => t.project_id === p.id);
  const open = projTasks.filter(t => t.status !== 'done');
  const done = projTasks.filter(t => t.status === 'done');

  return (

        background: `linear-gradient(180deg, ${p.accent}1A 0%, ${c.cream} 100%)`,
        borderBottom: `1px solid ${c.borderSoft}`,

          fontFamily: fontBody, fontSize: 9, color: p.accent,
          letterSpacing: '0.22em', marginBottom: 6, fontWeight: 600,

          fontFamily: fontDisplay, fontSize: 22, color: c.ink,
          fontWeight: 500, margin: 0, lineHeight: 1.2,
        }}>{p.name}</h1>

            fontStyle: 'italic', lineHeight: 1.5,

        <div style={{ marginTop: 12, display: 'flex', alignItems: 'center', gap: 8 }}>
          {ownerProfile && <Avatar name={ownerProfile.short} size={22} accent={p.accent} />}
          <span style={{ fontFamily: fontBody, fontSize: 11, color: c.ink, fontWeight: 500 }}>
            {ownerProfile?.short}
          </span>
          <span style={{ fontFamily: fontBody, fontSize: 10, color: c.inkLight }}>オーナー</span>
          <div style={{ marginLeft: 'auto' }}>
            <PhasePill phase={p.phase} full />
          </div>
        </div>
      </div>

      {/* Members */}
      <div style={{ padding: '12px 18px 4px' }}>
        <div style={{
          fontFamily: fontBody, fontSize: 9, color: c.inkLight,
          letterSpacing: '0.2em', marginBottom: 8, fontWeight: 600,
        }}>メンバー ({members.length})</div>
        <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
          {members.map(m => (
            <div key={m.id} style={{
              display: 'flex', alignItems: 'center', gap: 5,
              background: c.paper, border: `1px solid ${c.border}`,
              padding: '3px 10px 3px 3px', borderRadius: 999,
            }}>
              <Avatar name={m.short} size={20} accent={m.accent} />
              <span style={{ fontFamily: fontBody, fontSize: 11, color: c.ink }}>{m.short}</span>
            </div>
          ))}
        </div>
      </div>

      {/* Tasks */}
      <div style={{ padding: '14px 18px 4px' }}>
        <div style={{
          display: 'flex', alignItems: 'center', justifyContent: 'space-between',
          marginBottom: 8,
        }}>
          <div style={{
            fontFamily: fontBody, fontSize: 9, color: c.inkLight,
            letterSpacing: '0.2em', fontWeight: 600,
          }}>タスク ({open.length}/{projTasks.length})</div>
          {myRole.canAssignTasks && (
            <button onClick={() => setModal({ type: 'addTask', projectId: p.id })} style={{
              background: c.ink, color: c.paper, border: 'none',
              padding: '4px 10px', borderRadius: 999,
              fontFamily: fontBody, fontSize: 10, fontWeight: 500, cursor: 'pointer',
            }}>+ 追加</button>
          )}
        </div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
          {open.map(t => {
            const assignee = state.profiles.find(u => u.id === t.assignee_id);
            return (
              <button key={t.id} onClick={() => setModal({ type: 'editTask', taskId: t.id })} style={{
                background: c.paper, border: `1px solid ${c.border}`,
                borderRadius: 10, padding: '10px 12px', cursor: 'pointer',
                textAlign: 'left', display: 'flex', alignItems: 'center', gap: 10,
              }}>
                <PriorityDot priority={t.priority} />
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{
                    fontFamily: fontBody, fontSize: 12, color: c.ink, fontWeight: 500,
                    overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap',
                  }}>{t.title}</div>
                  <div style={{
                    fontFamily: fontBody, fontSize: 9, color: c.inkLight, marginTop: 2,
                  }}>
                    <span style={{ color: dueColor(t.due), fontWeight: 600 }}>
                      {t.due ? formatDue(t.due) : '締切なし'}
                    </span>
                    {assignee && <> ・ {assignee.short}</>}
                  </div>
                </div>
                {assignee && <Avatar name={assignee.short} size={20} accent={assignee.accent} />}
              </button>
            );
          })}
          {open.length === 0 && (
            <div style={{
              padding: 16, textAlign: 'center',
              background: c.paper, border: `1px dashed ${c.border}`, borderRadius: 10,
              fontFamily: fontBody, fontSize: 11, color: c.inkLight,
            }}>未完了のタスクはありません</div>
          )}
        </div>
      </div>

      {/* Done tasks (collapsed) */}
      {done.length > 0 && (
        <div style={{ padding: '14px 18px 4px' }}>
          <div style={{
            fontFamily: fontBody, fontSize: 9, color: c.inkLight,
            letterSpacing: '0.2em', marginBottom: 8, fontWeight: 600,
          }}>完了済み ({done.length})</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
            {done.slice(0, 3).map(t => (
              <div key={t.id} style={{
                background: 'transparent',
                padding: '6px 4px', display: 'flex', alignItems: 'center', gap: 8,
              }}>
                <svg width="14" height="14" viewBox="0 0 12 12">
                  <circle cx="6" cy="6" r="6" fill={c.sage}/>

                <span style={{
                  fontFamily: fontBody, fontSize: 11, color: c.inkLight,
                  textDecoration: 'line-through', flex: 1,

                }}>{t.title}</span>
              </div>
            ))}
            {done.length > 3 && (
              <div style={{
                fontFamily: fontBody, fontSize: 10, color: c.inkLight,
                padding: '4px 4px',
              }}>…ほか{done.length - 3}件</div>
            )}
          </div>
        </div>
      )}

      <div style={{ height: 80 }}/>
    </div>
  );
}

function RecordingCard({ rec, state, onDelete, onProjectClick }) {
  const proj = state.projects.find(p => p.id === rec.project_id);
  const user = state.profiles.find(u => u.id === rec.user_id);
  const audioRef = React.useRef(null);
  const [playing, setPlaying] = React.useState(false);

  const formatDuration = (sec) => {
    const m = Math.floor(sec / 60);
    const s = sec % 60;
    return `${m}:${String(s).padStart(2,'0')}`;
  };

  const togglePlay = () => {
    if (!audioRef.current) return;
    if (playing) {
      audioRef.current.pause();
      setPlaying(false);
    } else {
      audioRef.current.play();
      setPlaying(true);
    }
  };

  return (
    <div style={{
      background: c.paper, border: `1px solid ${c.border}`,
      borderRadius: 10, padding: '12px 14px',
    }}>
      <div style={{
        display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', gap: 8, marginBottom: 6,
      }}>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 3 }}>
            {proj && (
              <button onClick={onProjectClick} style={{
                background: `${proj.accent}1A`, border: 'none', padding: '2px 8px', borderRadius: 999,
                fontFamily: fontBody, fontSize: 9, color: proj.accent, fontWeight: 600,
                cursor: 'pointer', letterSpacing: '0.04em',
              }}>{proj.name}</button>
            )}
          </div>
          <div style={{
            fontFamily: fontDisplay, fontSize: 13, color: c.ink, fontWeight: 500,
            lineHeight: 1.3,
          }}>{rec.title}</div>
        </div>
        <button onClick={onDelete} style={{
          background: 'transparent', border: 'none', padding: 4, cursor: 'pointer',
          color: c.inkLight, fontSize: 14,
        }}>✕</button>
      </div>

      {/* Audio player */}
      {rec.audio && (
        <>
          <audio ref={audioRef} src={rec.audio} onEnded={() => setPlaying(false)} style={{ display: 'none' }}/>
          <div style={{
            display: 'flex', alignItems: 'center', gap: 10,
            background: c.cream, borderRadius: 8, padding: '6px 10px', marginBottom: 6,
          }}>
            <button onClick={togglePlay} style={{
              width: 28, height: 28, borderRadius: '50%',
              background: c.accent, color: c.paper, border: 'none',
              cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center',
              flexShrink: 0,
            }}>
              {playing ? (
                <svg width="10" height="10" viewBox="0 0 12 12">
                  <rect x="2" y="2" width="3" height="8" fill={c.paper}/>
                  <rect x="7" y="2" width="3" height="8" fill={c.paper}/>
                </svg>
              ) : (
                <svg width="10" height="10" viewBox="0 0 12 12">
                  <path d="M3 2L10 6L3 10z" fill={c.paper}/>
                </svg>
              )}
            </button>
            <div style={{ flex: 1, height: 4, background: c.borderSoft, borderRadius: 2, overflow: 'hidden' }}>
              <div style={{ width: '0%', height: '100%', background: c.accent }}/>
            </div>
            <span style={{ fontFamily: fontMono, fontSize: 10, color: c.inkSoft }}>
              {formatDuration(rec.duration)}
            </span>
          </div>
        </>
      )}
      {!rec.audio && (
        <div style={{
          padding: '6px 10px', background: c.cream, borderRadius: 8, marginBottom: 6,
          fontFamily: fontBody, fontSize: 10, color: c.inkLight,
        }}>音声データなし（サンプル）・ {formatDuration(rec.duration)}</div>
      )}

      {rec.memo && (
        <div style={{
          fontFamily: fontBody, fontSize: 11, color: c.inkSoft,
          lineHeight: 1.5, marginBottom: 4,
        }}>{rec.memo}</div>
      )}
      <div style={{
        fontFamily: fontBody, fontSize: 9, color: c.inkLight,
        display: 'flex', gap: 6,
      }}>
        {user && <span>{user.short}</span>}
        <span>・</span>
        <span>{formatRelative(rec.created_at)}</span>
      </div>
    </div>
  );
}

function ProfileView({ state, setState, switchUser, updateProfile, addProfile, deleteProfile, showToast }) {
  const me = state.profiles.find(p => p.id === state.currentUserId);
  const myTasks = state.tasks.filter(t => t.assignee_id === me.id);
  const myProjects = state.projects.filter(p => p.member_ids.includes(me.id));
  const [showAdd, setShowAdd] = React.useState(false);
  const [editingId, setEditingId] = React.useState(null);
  const [editingEmail, setEditingEmail] = React.useState(false);
  const [emailDraft, setEmailDraft] = React.useState(me.email || '');

  React.useEffect(() => {
    setEmailDraft(me.email || '');
  }, [me.id]);

  const grouped = ['rep','pm','member','ob'].map(role => ({
    role,
    label: ROLES[role].label,
    members: state.profiles.filter(p => p.role === role),

  const reset = () => {
    if (confirm('すべてのデータを初期化しますか？\nこの操作は元に戻せません。')) {
      setState(seedData());
      showToast('データを初期化しました');
    }
  };

  const saveEmail = () => {
    updateProfile(me.id, { email: emailDraft.trim() });
    setEditingEmail(false);
    showToast('メールアドレスを保存しました');
  };

  return (
    <div style={{ flex: 1, overflowY: 'auto' }} className="scroll-hide">
      <div style={{ padding: '20px 18px 14px', textAlign: 'center' }}>
        <div style={{
          margin: '0 auto', width: 60, height: 60, borderRadius: '50%',
          background: c.paper, border: `2px solid ${me.accent}`,
          color: me.accent, fontFamily: fontDisplay, fontSize: 26,
          display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 500,

        <h1 style={{
          fontFamily: fontDisplay, fontSize: 18, color: c.ink,
          margin: '10px 0 2px', fontWeight: 500,
        }}>{me.name}</h1>
        <div style={{
          fontFamily: fontBody, fontSize: 9, color: c.inkLight,
          letterSpacing: '0.2em',
        }}>{ROLES[me.role].label} ・ {myProjects.length}プロジェクト ・ {myTasks.length}タスク</div>

          fontFamily: fontBody, fontSize: 9, color: c.inkLight,
          letterSpacing: '0.2em', marginBottom: 6, fontWeight: 600,

        <div style={{
          background: c.paper, border: `1px solid ${c.border}`,
          borderRadius: 10, padding: '10px 14px',
        }}>

            <div>

                <button onClick={() => { setEditingEmail(false); setEmailDraft(me.email || ''); }} style={{
                  flex: 1, padding: '6px', background: 'transparent', color: c.inkSoft,
                  border: `1px solid ${c.border}`, borderRadius: 6, fontFamily: fontBody,
                  fontSize: 11, cursor: 'pointer',
                }}>キャンセル</button>

            </div>
          ) : (
            <button onClick={() => setEditingEmail(true)} style={{

              background: 'transparent', border: 'none', cursor: 'pointer', textAlign: 'left',

// ─── RECORD MODAL (uses MediaRecorder) ───────────────────────
function RecordModal({ state, onClose, onSubmit }) {
  const [phase, setPhase] = React.useState('ready'); // ready / recording / preview / saving
  const [duration, setDuration] = React.useState(0);
  const [audioUrl, setAudioUrl] = React.useState(null);
  const [audioBase64, setAudioBase64] = React.useState(null);
  const [title, setTitle] = React.useState('');
  const [memo, setMemo] = React.useState('');
  const [projectId, setProjectId] = React.useState(state.projects[0]?.id || '');
  const [error, setError] = React.useState(null);

  const mediaRecorderRef = React.useRef(null);
  const chunksRef = React.useRef([]);
  const timerRef = React.useRef(null);
  const streamRef = React.useRef(null);

  const formatDuration = (sec) => {
    const m = Math.floor(sec / 60);
    const s = sec % 60;
    return `${m}:${String(s).padStart(2,'0')}`;
  };

  const start = async () => {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      streamRef.current = stream;
      const recorder = new MediaRecorder(stream);
      mediaRecorderRef.current = recorder;
      chunksRef.current = [];
      recorder.ondataavailable = (e) => {
        if (e.data && e.data.size > 0) chunksRef.current.push(e.data);
      };
      recorder.onstop = () => {
        const blob = new Blob(chunksRef.current, { type: 'audio/webm' });
        const url = URL.createObjectURL(blob);
        setAudioUrl(url);
        // Convert to base64 for storage
        const reader = new FileReader();
        reader.onloadend = () => {
          setAudioBase64(reader.result);
        };
        reader.readAsDataURL(blob);
        // Stop timer
        if (timerRef.current) {
          clearInterval(timerRef.current);
          timerRef.current = null;
        }
        // Stop stream tracks
        if (streamRef.current) {
          streamRef.current.getTracks().forEach(t => t.stop());
        }
        setPhase('preview');
        setTitle(`${new Date().getMonth()+1}/${new Date().getDate()} 録音`);
      };
      recorder.start();
      setPhase('recording');
      setDuration(0);
      timerRef.current = setInterval(() => setDuration(d => d + 1), 1000);
    } catch (err) {
      setError(`録音できません：${err.message || 'マイクへのアクセスが拒否されました'}`);
    }
  };

  const stop = () => {
    if (mediaRecorderRef.current && mediaRecorderRef.current.state === 'recording') {
      mediaRecorderRef.current.stop();
    }
  };

  const cancel = () => {
    if (mediaRecorderRef.current && mediaRecorderRef.current.state === 'recording') {
      mediaRecorderRef.current.stop();
    }
    if (timerRef.current) clearInterval(timerRef.current);
    if (streamRef.current) streamRef.current.getTracks().forEach(t => t.stop());
    onClose();
  };

  const save = () => {
    onSubmit({
      project_id: projectId,
      title: title.trim() || `${new Date().getMonth()+1}/${new Date().getDate()} 録音`,
      memo: memo.trim(),
      duration,
      audio: audioBase64,
    });
  };

  React.useEffect(() => {
    return () => {
      if (timerRef.current) clearInterval(timerRef.current);
      if (streamRef.current) streamRef.current.getTracks().forEach(t => t.stop());
    };
  }, []);

  return (
    <div style={{
      position: 'absolute', inset: 0, background: 'rgba(28,25,22,0.55)',
      display: 'flex', alignItems: 'flex-end', zIndex: 100,
    }} onClick={phase === 'recording' ? null : cancel}>
      <div onClick={e => e.stopPropagation()} style={{
        width: '100%', background: c.cream, borderTopLeftRadius: 20, borderTopRightRadius: 20,
        maxHeight: '85%', display: 'flex', flexDirection: 'column',
      }}>
        <div style={{
          padding: '14px 18px', display: 'flex', alignItems: 'center', justifyContent: 'space-between',
          borderBottom: `1px solid ${c.borderSoft}`,
        }}>
          <button onClick={cancel} style={{
            background: 'transparent', border: 'none', padding: 4,
            fontFamily: fontBody, fontSize: 12, color: c.inkSoft, cursor: 'pointer',
          }}>{phase === 'recording' ? '録音中...' : 'キャンセル'}</button>
          <h2 style={{ fontFamily: fontDisplay, fontSize: 14, color: c.ink, margin: 0, fontWeight: 500 }}>
            {phase === 'ready' && '新しい録音'}
            {phase === 'recording' && '録音中'}
            {phase === 'preview' && '録音内容を保存'}
          </h2>
          {phase === 'preview' && (
            <button onClick={save} style={{
              background: 'transparent', border: 'none', padding: 4,
              fontFamily: fontBody, fontSize: 12, fontWeight: 600,
              color: c.accent, cursor: 'pointer',
            }}>保存</button>
          )}
          {phase !== 'preview' && <span style={{ width: 50 }}/>}
        </div>

        <div style={{ padding: 24, overflowY: 'auto', flex: 1 }}>
          {error && (
            <div style={{
              padding: 12, background: c.accentSoft, borderRadius: 8,
              color: c.warning, fontFamily: fontBody, fontSize: 11, marginBottom: 12,
            }}>{error}</div>
          )}

          {phase === 'ready' && (
            <div style={{ textAlign: 'center', padding: '20px 0' }}>
              <p style={{ fontFamily: fontBody, fontSize: 12, color: c.inkSoft, margin: '0 0 24px', lineHeight: 1.7 }}>
                マイクへのアクセスを許可すると、<br/>会議や打ち合わせを録音できます。
              </p>
              <button onClick={start} style={{
                width: 100, height: 100, borderRadius: '50%',
                background: c.accent, color: c.paper, border: 'none',
                cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center',
                margin: '0 auto', boxShadow: '0 4px 20px rgba(210,104,73,0.4)',
              }}>
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none">
                  <rect x="9" y="3" width="6" height="11" rx="3" stroke={c.paper} strokeWidth="1.8" fill="none"/>
                  <path d="M5 11a7 7 0 0014 0M12 18v3" stroke={c.paper} strokeWidth="1.8" strokeLinecap="round"/>
                </svg>
              </button>
              <p style={{ fontFamily: fontBody, fontSize: 11, color: c.inkLight, margin: '14px 0 0' }}>
                タップで録音開始
              </p>
            </div>
          )}

          {phase === 'recording' && (
            <div style={{ textAlign: 'center', padding: '20px 0' }}>
              <div style={{
                fontFamily: fontMono, fontSize: 36, color: c.accent, fontWeight: 600, marginBottom: 24,
              }}>{formatDuration(duration)}</div>
              <div style={{ display: 'flex', justifyContent: 'center', gap: 4, marginBottom: 24 }}>
                {[0,1,2,3,4,5,6,7,8].map(i => (
                  <div key={i} style={{
                    width: 4, height: 16 + Math.sin((duration * 2 + i) * 0.7) * 12 + 12,
                    background: c.accent, borderRadius: 2,
                    animation: 'pulse 1s infinite',
                  }}/>
                ))}
              </div>
              <button onClick={stop} style={{
                width: 90, height: 90, borderRadius: '50%',
                background: c.danger, color: c.paper, border: `4px solid ${c.paper}`,
                cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center',
                margin: '0 auto', boxShadow: '0 4px 20px rgba(181,61,45,0.4)',
              }}>
                <div style={{ width: 28, height: 28, background: c.paper, borderRadius: 4 }}/>
              </button>
              <p style={{ fontFamily: fontBody, fontSize: 11, color: c.inkLight, margin: '14px 0 0' }}>
                タップで停止
              </p>
            </div>
          )}

          {phase === 'preview' && (
            <>
              <FormField label="タイトル" required>
                <input value={title} onChange={e => setTitle(e.target.value)} autoFocus
                  style={inputStyle}/>
              </FormField>

              <FormField label="プロジェクト" required>
                <select value={projectId} onChange={e => setProjectId(e.target.value)} style={inputStyle}>
                  {state.projects.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
                </select>
              </FormField>

              <FormField label="メモ" hint="任意">
                <textarea value={memo} onChange={e => setMemo(e.target.value)} rows={3}
                  placeholder="議論のポイントなど"
                  style={{ ...inputStyle, resize: 'vertical', fontFamily: fontBody }}/>
              </FormField>

              {audioUrl && (
                <FormField label="プレビュー">
                  <audio src={audioUrl} controls style={{ width: '100%' }}/>
                  <p style={{
                    fontFamily: fontBody, fontSize: 10, color: c.inkLight,
                    margin: '6px 0 0',
                  }}>長さ：{formatDuration(duration)}</p>
                </FormField>
              )}
            </>
          )}
        </div>
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(React.StrictMode, null, React.createElement(App)));
setTimeout(() => document.getElementById('loading').classList.add('hidden'), 200);
</script>
</body>
</html>
